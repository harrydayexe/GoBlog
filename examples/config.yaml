# GoBlog Configuration Example

# Enable verbose logging
verbose: true

# Input folder containing markdown posts
input_folder: "./examples/posts"

# Output folder for generated static site
output_folder: "./examples/site"

# Static assets folder (CSS, JS, images)
static_folder: "./examples/static"

# Template directory (optional - defaults to ./templates/defaults)
# Specify a custom directory with post.html, index.html, and tag.html
# template_dir: "./my-custom-templates"

# Site metadata
site:
  title: "My Tech Blog"
  description: "A blog about Go, web development, and technology"
  author: "Your Name"
  url: "https://example.com"

# Pagination settings
posts_per_page: 5

# Blog URL path
blog_path: "/blog"
