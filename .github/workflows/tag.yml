name: Auto Tag

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  tag:
    name: Create Version Tag
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version and create tag
        id: version
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch
          release_branches: main
          # Conventional commits:
          # feat: -> minor bump
          # fix: -> patch bump
          # feat!: or BREAKING CHANGE: -> major bump
          tag_prefix: v
          create_annotated_tag: true

      - name: Summary
        run: |
          echo "### Version Tag Created! 🏷️" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**New Tag**: ${{ steps.version.outputs.new_tag }}" >> $GITHUB_STEP_SUMMARY
          echo "**Previous Tag**: ${{ steps.version.outputs.previous_tag || 'none' }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Changelog**:" >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.version.outputs.changelog }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "The release workflow will now be triggered automatically." >> $GITHUB_STEP_SUMMARY
